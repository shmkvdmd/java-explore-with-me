server:
  port: 8080
  address: 0.0.0.0

spring:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      mode: always
  mvc:
    format:
      date-time: yyyy-MM-dd HH:mm:ss
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:main-db}:${DB_PORT:5432}/${DB_NAME:main}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:main}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:main}}

stats-server:
  url: ${STATS_SERVER_URL:http://stats-server:9090}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health

---
spring:
  config:
    activate:
      on-profile: ci,test
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:exploreWithMe;MODE=PostgreSQL
    username: test
    password: test
